name: 01-Building Blocks

on: [ push , workflow_dispatch]

jobs: 
  echo-hello: 
    runs-on: ubuntu-latest

    steps: 
      - name: Say hello
        run: echo "Hi Paul, How Are You today"

      - name: Multi-line bash
        run: |
            echo "I am"
            echo "a multi-line"
            echo "script."
  echo-goodbye: 
    needs: echo-hello
    runs-on: ubuntu-latest

    steps: 
        - name: Failed Step
          run: |
            echo "I will Succeed"
            exit 0
        - name: Say GoodBye
          run: echo "GoodBye"



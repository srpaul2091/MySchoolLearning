name: Python My School Test Learning Artifact 
on:  
  push: 
    branches: 
      - main   
env:
  MONGODB_DB_NAME: mytododb

jobs:
  test:
    env: 
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_HOST: cluster0.mp3lyec.mongodb.net
      MONGODB_APP_NAME: Cluster0

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Start Flask app in background
        run: |
          python app.py &
          sleep 5

      - name: Test app with curl
        run: |
          curl --fail http://127.0.0.1:8002/pupil
          mkdir -p artifacts
          pytest --junitxml=artifacts/junit.xml --cov=. --cov-report=xml:artifacts/coverage.xml          

      - name: Upload Artifacts 
        uses: actions/upload-artifact@v7
        with:           
          name: python-test-artifacts
          path: artifacts/

      - name: Output Hostname
        run: |
          echo  "MONGODB_HOST: ${{ env.MONGODB_HOST }}"
          echo  "MONGODB_HOST: $MONGODB_HOST"

           
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Debug image name
        run: echo "${{ secrets.DOCKERHUB_USERNAME }}/my-school-pupil:2.0.0"

      - name: Build docker image 
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-school-pupil:2.0.0 .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push  Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-school-pupil:2.0.0

  
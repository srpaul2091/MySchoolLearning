name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - run: |
          docker build -t school-pupil .

      - run: |
          aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin $ECR_URI

      - run: |
          docker tag school-pupil:latest $ECR_URI:latest
          docker push $ECR_URI:latest

      - run: |
          aws eks update-kubeconfig \
            --name my-cluster \
            --region ap-southeast-2

      - run: |
          kubectl rollout restart deployment/school-pupil